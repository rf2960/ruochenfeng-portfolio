<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1600 900' role='img'>
  <defs>
    <linearGradient id='bg' x1='0' x2='1' y1='0' y2='1'><stop offset='0' stop-color='#eef5f4'/><stop offset='1' stop-color='#f7f4ee'/></linearGradient>
    <filter id='shadow' x='-20%' y='-20%' width='140%' height='140%'><feDropShadow dx='0' dy='18' stdDeviation='18' flood-color='#1c2a2d' flood-opacity='0.12'/></filter>
  </defs>
  <rect width='1600' height='900' fill='url(#bg)'/>
  <style>
    .k{font-family:Inter,Manrope,Arial,sans-serif;font-size:22px;font-weight:800;letter-spacing:4px;fill:#6d7b61;text-transform:uppercase}
    .h{font-family:Georgia,serif;font-size:64px;font-weight:700;fill:#171614}
    .sub{font-family:Inter,Manrope,Arial,sans-serif;font-size:25px;fill:#66706a}
    .card{fill:#fffdf8;stroke:#d7d0c4;filter:url(#shadow)}
    .label{font-family:Inter,Manrope,Arial,sans-serif;font-size:20px;font-weight:800;fill:#637068}
    .body{font-family:Inter,Manrope,Arial,sans-serif;font-size:24px;fill:#242422}
    .muted{font-family:Inter,Manrope,Arial,sans-serif;font-size:20px;fill:#6f6a61}
    .num{font-family:Georgia,serif;font-size:58px;font-weight:700;fill:#171614}
  </style>

  <text x='90' y='90' class='k'>Live Analysis</text>
  <text x='90' y='165' class='h'>SMCI signal packet</text>
  <text x='90' y='215' class='sub'>Saved Streamlit demo output from local project data</text>
  <rect x='90' y='275' width='430' height='430' rx='22' class='card'/>
  <text x='125' y='335' class='label'>Direction</text>
  <text x='125' y='405' class='num'>Bullish</text>
  <text x='125' y='462' class='body'>Confidence 75%</text>
  <text x='125' y='515' class='muted'>Horizon: 5 days</text>
  <text x='125' y='565' class='muted'>Source quality: 0.67</text>
  <text x='125' y='615' class='muted'>Sentiment score: +0.38</text>
  <rect x='570' y='275' width='940' height='430' rx='22' class='card'/>
  <text x='610' y='335' class='label'>Catalyst</text>
  <text x='610' y='382' class='body'>beat as revenue more than doubles - CNBC.</text>
  <text x='610' y='450' class='label'>Reasoning</text>
  <text x='610' y='497' class='muted'>The Bullish thesis for this asset is based on analysis of 3 supporting and 0 contradicting evidence items. Thesis str?</text>
  <text x='610' y='565' class='label'>Agent trace</text>
  <text x='610' y='610' class='muted'>Analyst Agent ? Strategist Agent ? Decision Agent</text>
  <text x='90' y='790' class='muted'>Inputs: ticker-level news, technical factors, macro context ? Output: structured signal packet with citations and risks</text>
</svg>