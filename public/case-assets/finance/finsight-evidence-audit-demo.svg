<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1600 900' role='img'>
  <defs>
    <linearGradient id='bg' x1='0' x2='1' y1='0' y2='1'><stop offset='0' stop-color='#eef5f4'/><stop offset='1' stop-color='#f7f4ee'/></linearGradient>
    <filter id='shadow' x='-20%' y='-20%' width='140%' height='140%'><feDropShadow dx='0' dy='18' stdDeviation='18' flood-color='#1c2a2d' flood-opacity='0.12'/></filter>
  </defs>
  <rect width='1600' height='900' fill='url(#bg)'/>
  <style>
    .k{font-family:Inter,Manrope,Arial,sans-serif;font-size:22px;font-weight:800;letter-spacing:4px;fill:#6d7b61;text-transform:uppercase}
    .h{font-family:Georgia,serif;font-size:64px;font-weight:700;fill:#171614}
    .sub{font-family:Inter,Manrope,Arial,sans-serif;font-size:25px;fill:#66706a}
    .card{fill:#fffdf8;stroke:#d7d0c4;filter:url(#shadow)}
    .label{font-family:Inter,Manrope,Arial,sans-serif;font-size:20px;font-weight:800;fill:#637068}
    .body{font-family:Inter,Manrope,Arial,sans-serif;font-size:24px;fill:#242422}
    .muted{font-family:Inter,Manrope,Arial,sans-serif;font-size:20px;fill:#6f6a61}
    .num{font-family:Georgia,serif;font-size:58px;font-weight:700;fill:#171614}
  </style>

  <text x='90' y='90' class='k'>Evidence Audit</text>
  <text x='90' y='165' class='h'>Citations and agent path</text>
  <text x='90' y='215' class='sub'>Source cards and trace fields from a saved signal packet</text>
  <text x='110' y='300' class='label'>Retrieved evidence</text>
  <text x='850' y='300' class='label'>Agent trace</text>
  
      <rect x='110' y='322' width='640' height='112' rx='16' fill='#fffdf8' stroke='#d7d0c4'/>
      <text x='140' y='360' class='label'>1. Bloomberg ? credibility 0.95</text>
      <text x='140' y='398' class='muted'>Finance Pros Race Through New York to Win the Super Bowl of Puzzles - Bloombe?</text>
    
      <rect x='110' y='457' width='640' height='112' rx='16' fill='#fffdf8' stroke='#d7d0c4'/>
      <text x='140' y='495' class='label'>2. Google News ? credibility 0.65</text>
      <text x='140' y='533' class='muted'>Is Trending Stock Super Micro Computer, Inc. (SMCI) a Buy Now? - Yahoo Finance</text>
    
      <rect x='110' y='592' width='640' height='112' rx='16' fill='#fffdf8' stroke='#d7d0c4'/>
      <text x='140' y='630' class='label'>3. Google News ? credibility 0.70</text>
      <text x='140' y='668' class='muted'>Super Micro stock jumps 18% on guidance beat as revenue more than doubles - C?</text>
    
  
      <rect x='850' y='322' width='610' height='112' rx='16' fill='#fffdf8' stroke='#d7d0c4'/>
      <text x='880' y='360' class='label'>Analyst Agent</text>
      <text x='880' y='398' class='muted'>Evidence reviewed across 8 sources. Overall sentiment balance: bullish.</text>
    
      <rect x='850' y='457' width='610' height='112' rx='16' fill='#fffdf8' stroke='#d7d0c4'/>
      <text x='880' y='495' class='label'>Strategist Agent</text>
      <text x='880' y='533' class='muted'>SMCI shows bullish catalysts driven by beat as revenue more than doubles?</text>
    
      <rect x='850' y='592' width='610' height='112' rx='16' fill='#fffdf8' stroke='#d7d0c4'/>
      <text x='880' y='630' class='label'>Decision Agent</text>
      <text x='880' y='668' class='muted'>Direction: Bullish. Confidence: 75%. The Bullish thesis for this asset is?</text>
    
  <text x='90' y='790' class='muted'>The interface keeps generated claims close to source metadata instead of showing an answer alone.</text>
</svg>